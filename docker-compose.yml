version: '3.8'

services:
  # Configuration Server (must start first)
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - land-platform-network

  # Service Discovery
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      - config-server
    networks:
      - land-platform-network

  # User Service
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      - config-server
      - eureka-server
    networks:
      - land-platform-network
    restart: on-failure

  # Land Service
  land-service:
    build: ./land-service
    container_name: land-service
    ports:
      - "8082:8082"
    environment:
      - LAND_DATASOURCE_URL=${LAND_DATASOURCE_URL}
      - LAND_DATASOURCE_USERNAME=${LAND_DATASOURCE_USERNAME}
      - LAND_DATASOURCE_PASSWORD=${LAND_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      - config-server
      - eureka-server
    networks:
      - land-platform-network
    restart: on-failure

  # Investment Service
  investment-service:
    build: ./investment-service
    container_name: investment-service
    ports:
      - "8083:8083"
    environment:
      - INVESTMENT_DATASOURCE_URL=${INVESTMENT_DATASOURCE_URL}
      - INVESTMENT_DATASOURCE_USERNAME=${INVESTMENT_DATASOURCE_USERNAME}
      - INVESTMENT_DATASOURCE_PASSWORD=${INVESTMENT_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      - config-server
      - eureka-server
    networks:
      - land-platform-network
    restart: on-failure

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - land-platform-network

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - land-platform-network

  # API Gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
    depends_on:
      - config-server
      - eureka-server
      - user-service
      - land-service
      - investment-service
    networks:
      - land-platform-network

  file-storage:
    build:
      context: ./file-storage
      dockerfile: Dockerfile
    container_name: file-storage-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    depends_on:
      - eureka-server
      - config-server
    networks:
      - land-platform-network

networks:
  land-platform-network:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data:
