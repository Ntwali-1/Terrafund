spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      uri: ${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
      fail-fast: false
      enabled: true

jwt:
  secret: 9f4c2a7b8d13e6f0c5b9a1d4e8f2736b

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Investment Service
        url: /investment-service/v3/api-docs
      - name: Land Service
        url: /land-service/v3/api-docs
  api-docs:
    enabled: true
