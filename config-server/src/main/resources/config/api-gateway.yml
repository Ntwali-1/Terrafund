server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin, RETAIN_FIRST
      discovery:
        locator:
          enabled: true
      routes:
        - id: user-service-openapi
          uri: http://localhost:8081
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/v3/api-docs, /v3/api-docs

        - id: investment-service-openapi
          uri: lb://investment-service
          predicates:
            - Path=/investment-service/v3/api-docs
          filters:
            - RewritePath=/investment-service/v3/api-docs, /v3/api-docs

        - id: land-service-openapi
          uri: lb://land-service
          predicates:
            - Path=/land-service/v3/api-docs
          filters:
            - RewritePath=/land-service/v3/api-docs, /v3/api-docs

        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - AuthenticationFilter

        - id: investment-service
          uri: lb://investment-service
          predicates:
            - Path=/api/investments/**
          filters:
            - AuthenticationFilter

        - id: land-service
          uri: lb://land-service
          predicates:
            - Path=/api/lands/**

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:4200"
              - "http://localhost:8082"
              - "http://localhost:8088"
              - "http://192.168.43.187:8088"
              - "http://192.168.43.187:8080"
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: User Service
        url: /user-service/v3/api-docs
      - name: Investment Service
        url: /investment-service/v3/api-docs
      - name: Land Service
        url: /land-service/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    hostname: localhost
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.services.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true
