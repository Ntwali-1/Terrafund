server:
  port: 8082

spring:
  application:
    name: land-service

  datasource:
    url: jdbc:postgresql://localhost:5432/landdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

jwt:
  secret: 9f4c2a7b8d13e6f0c5b9a1d4e8f2736b
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    hostname: localhost
    prefer-ip-address: false
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10
    instance-id: ${spring.application.name}:${server.port}

application:
  land:
    image:
      allowed-extensions:
        - jpg
        - jpeg
        - png
        - webp
      max-images-per-land: 10
    document:
      allowed-extensions:
        - pdf
        - doc
        - docx
      max-documents-per-land: 5
  validation:
    min-land-area: 100
    max-land-area: 1000000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
